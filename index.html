  <style>

      --bg: #f3f5f7;

      --ink: #17212b;
      --muted: #65727f;
      --line: #dbe2e8;
      --blue: #1e5b8f;
      --red: #c83b3b;
      --green: #16885a;
      --amber: #986c14;
      --soft: #eef3f7;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    header { background: #172431; color: #fff; border-bottom: 4px solid #416f89; }
    .wrap, main, .tabs { max-width: 1480px; margin: 0 auto; }
    .wrap { padding: 18px 22px; }
    .topbar { display: flex; justify-content: space-between; gap: 16px; align-items: flex-end; }
    h1 { margin: 0 0 6px; font-size: 26px; }
    .sub { color: #c0ccd5; font-size: 13px; line-height: 1.6; }
    .datebox {
      border: 1px solid #526f82;
      background: #22313d;
      padding: 8px 10px;
      font-size: 13px;
      line-height: 1.6;
      white-space: nowrap;
    }
    nav { background: #fff; border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 5; }
    .tabs { display: flex; gap: 2px; padding: 0 22px; overflow: auto; }
    .tab {
      border: 0;
      background: transparent;
      padding: 13px 16px;
      font-size: 14px;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      white-space: nowrap;
    }
    .tab.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 700; }
    main { padding: 20px 22px; }
    .view { display: none; }
    .view.active { display: block; }
    .grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
    .grid3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
    .cols { display: grid; grid-template-columns: 1.2fr 1fr; gap: 12px; }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 14px; }
    .card h2 { font-size: 15px; margin: 0 0 10px; }
    .card h3 { font-size: 14px; margin: 14px 0 8px; }
    .num { font-size: 24px; font-weight: 700; }
    .muted { color: var(--muted); }
    .tag {
      display: inline-block;
      padding: 4px 7px;
      border: 1px solid var(--line);
      background: #f6f8fa;
      border-radius: 4px;
      font-size: 12px;
      margin: 2px;
    }
    .red { color: var(--red); }
    .green { color: var(--green); }
    .amber { color: var(--amber); }
    table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid var(--line); }
    .table-scroll { width: 100%; overflow-x: auto; border: 1px solid var(--line); background: #fff; }
    .table-scroll table { border: 0; min-width: 980px; }
    .compact-table th, .compact-table td { padding: 8px 8px; font-size: 12px; }
    .nowrap { white-space: nowrap; }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px 9px;
      text-align: left;
      font-size: 13px;
      vertical-align: top;
      line-height: 1.55;
    }
    th { background: #edf2f6; color: #3f4b56; }
    .section { margin-top: 14px; }
    .notice { border-left: 4px solid var(--amber); background: #fff8e8; }
    .risk { border-left: 4px solid var(--red); background: #fff4f4; }
    .good { border-left: 4px solid var(--green); background: #f2fbf6; }
    textarea {
      width: 100%;
      min-height: 330px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 12px;
      font-family: Consolas, "Microsoft YaHei", sans-serif;
      font-size: 13px;
    }
    button.action {
      border: 1px solid #9fb3c2;
      background: #fff;
      border-radius: 6px;
      padding: 8px 10px;
      cursor: pointer;
      margin-right: 8px;
    }
    .dense p { margin: 7px 0; line-height: 1.7; }
    .loader { padding: 30px; color: var(--muted); }
    @media (max-width: 900px) {
      .grid, .grid3, .cols { grid-template-columns: 1fr; }
      .topbar { display: block; }
      .datebox { margin-top: 12px; white-space: normal; }
      th, td { font-size: 12px; }
    }
  </style>
</head>

      if (v === null || v === undefined || v === "") return "-";
      const n = Number(v);
      if (!Number.isFinite(n)) return v || "-";
      return (n > 0 ? "+" : "") + n.toFixed(2) + "%";
    }

    function pctClass(v) {
      const n = Number(v);
      return n > 0 ? "red" : n < 0 ? "green" : "";
    }

      return `<div class="card"><h2>${title}</h2>${body}</div>`;
    }

                <td class="${pctClass(t.returnPct)}">${fmtPct(t.returnPct)}</td>
                <td>PE:${t.peTtm ?? t.pe ?? "-"} PB:${t.pb ?? "-"}<br><span class="muted">市值:${t.marketCapYi ?? "-"}亿</span></td>
                <td>${t.status || "-"}</td>
              </tr>`).join("")}
            </tbody></table>
          </div>
          <div class="section grid3">
            ${card("什么才算低估", "<p>PE/PB处在合理低位，同时ROE、现金流、分红或利润趋势不能明显恶化。</p>")}
            ${card("不能买的便宜", "<p>低PE可能是利润即将下修，低PB可能是资产质量差。没有ROE和现金流支撑，就是价值陷阱。</p>")}
            ${card("和5倍股模型的区别", "<p>5倍股模型找进攻弹性，超跌低估模型找修复赔率。前者看主升，后者看止跌和预期差。</p>")}
          </div>
        `;
      }

      if (id === "input") {
        html = `
          <div class="card"><h2>每日录入</h2>
            <textarea id="draft">日期：
持仓变化：
股票代码/名称：
仓位：
成本：
今日操作：
观察股票：
盘中感受：
想重点分析的问题：</textarea>
            <p>
              <button class="action" onclick="navigator.clipboard.writeText(document.getElementById('draft').value)">复制内容</button>
              <button class="action" onclick="localStorage.setItem('a_stock_daily_draft',document.getElementById('draft').value)">保存草稿</button>
              <button class="action" onclick="localStorage.removeItem('a_stock_daily_draft');location.reload()">重置模板</button>
            </p>
          </div>
        `;
      }

      if (id === "diagnosis") {
        html = `<div class="card notice dense"><h2>诊断前置条件</h2><p>${macro.summary || "先确认宏观/海外环境，再看个股技术面。"}</p></div><div class="section card"><h2>持仓诊断</h2>${holdingsTable()}</div>`;
      }

      if (id === "discipline") {
        html = `
          <div class="grid3">
            ${card("明日纪律", "<p>先处理风险，再找机会。任何反弹都要看量能和资金，不因跌多就默认反包。</p>")}
            ${card("仓位纪律", "<p>富特单票42.95%偏高，若补跌，先降到35%-38%；江丰若材料链不反包，降到10%以内；鼎龙弱势则清尾仓。</p>")}
            ${card("预案口径", "<p>早盘版必须写清数据时间和缺口。云端版会先自动补行情，深度新闻研判后续可接分析模型。</p>")}
          </div>
        `;
      }

      document.getElementById("main").innerHTML = html;
      const saved = localStorage.getItem("a_stock_daily_draft");
      const draft = document.getElementById("draft");
      if (draft && saved) draft.value = saved;
    }

    function holdingsTable() {
      return `<table><thead><tr><th>股票</th><th>仓位/主线</th><th>持仓收益</th><th>收盘/当日涨跌</th><th>日内高低</th><th>风险等级与动作</th></tr></thead><tbody>${holdingsRows()}</tbody></table>`;
    }

    function initTabs() {
      const tabs = document.getElementById("tabs");
      tabs.innerHTML = TABS.map(([id, label], i) => `<button class="tab ${i === 0 ? "active" : ""}" data-id="${id}">${label}</button>`).join("");
      tabs.querySelectorAll(".tab").forEach(btn => {
        btn.addEventListener("click", () => {
          tabs.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
          btn.classList.add("active");
          render(btn.dataset.id);
        });
      });
    }

    async function loadData() {
      try {
        const res = await fetch("data/dashboard.json?ts=" + Date.now(), { cache: "no-store" });
        if (res.ok) state = await res.json();
      } catch (error) {
        state = fallbackData;
      }
      document.getElementById("subtitle").textContent = `${state.meta.version || "云端版"} · ${state.meta.dataSource || ""}`;
      document.getElementById("updateBox").innerHTML = `页面更新时间：${state.meta.lastUpdated || "-"}<br>版本：${state.meta.session || "-"}<br>指导对象：${state.meta.guidanceTarget || "-"}<br>固定口径：工作日 09:00 / 12:30 / 17:00，周末 17:00`;
      initTabs();
      render("overview");
    }

    loadData();
  </script>
</body>
</html>
