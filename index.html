<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>A股跟踪仪表盘</title>
  <style>
    :root {
      --bg: #f3f5f7;
      --panel: #fff;
      --ink: #17212b;
      --muted: #65727f;
      --line: #dbe2e8;
      --blue: #1e5b8f;
      --red: #c83b3b;
      --green: #16885a;
      --amber: #986c14;
      --soft: #eef3f7;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    header { background: #172431; color: #fff; border-bottom: 4px solid #416f89; }
    .wrap, main, .tabs { max-width: 1480px; margin: 0 auto; }
    .wrap { padding: 18px 22px; }
    .topbar { display: flex; justify-content: space-between; gap: 16px; align-items: flex-end; }
    h1 { margin: 0 0 6px; font-size: 26px; }
    .sub { color: #c0ccd5; font-size: 13px; line-height: 1.6; }
    .datebox {
      border: 1px solid #526f82;
      background: #22313d;
      padding: 8px 10px;
      font-size: 13px;
      line-height: 1.6;
      white-space: nowrap;
    }
    nav { background: #fff; border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 5; }
    .tabs { display: flex; gap: 2px; padding: 0 22px; overflow: auto; }
    .tab {
      border: 0;
      background: transparent;
      padding: 13px 16px;
      font-size: 14px;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      white-space: nowrap;
    }
    .tab.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 700; }
    main { padding: 20px 22px; }
    .view { display: none; }
    .view.active { display: block; }
    .grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
    .grid3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
    .cols { display: grid; grid-template-columns: 1.2fr 1fr; gap: 12px; }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 14px; }
    .card h2 { font-size: 15px; margin: 0 0 10px; }
    .card h3 { font-size: 14px; margin: 14px 0 8px; }
    .num { font-size: 24px; font-weight: 700; }
    .muted { color: var(--muted); }
    .tag {
      display: inline-block;
      padding: 4px 7px;
      border: 1px solid var(--line);
      background: #f6f8fa;
      border-radius: 4px;
      font-size: 12px;
      margin: 2px;
    }
    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 7px;
      border-radius: 4px;
      border: 1px solid var(--line);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .status-chip::before { content: ""; width: 8px; height: 8px; border-radius: 50%; background: var(--amber); }
    .status-chip.deep::before { background: var(--green); }
    .status-chip.reasonable::before { background: #d3a42f; }
    .status-chip.trap::before { background: var(--red); }
    .stars { color: var(--amber); white-space: nowrap; letter-spacing: 0; }
    .score-stack { min-width: 94px; }
    .score-stack b { font-size: 16px; }
    .subtabs { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .subtab {
      display: inline-flex;
      align-items: center;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #f8fafc;
      color: #213547;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
    }
    .subtab:hover { border-color: var(--blue); color: var(--blue); }
    .red { color: var(--red); }
    .green { color: var(--green); }
    .amber { color: var(--amber); }
    table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid var(--line); }
    .table-scroll { width: 100%; overflow-x: auto; border: 1px solid var(--line); background: #fff; }
    .table-scroll table { border: 0; min-width: 980px; }
    .compact-table th, .compact-table td { padding: 8px 8px; font-size: 12px; }
    .nowrap { white-space: nowrap; }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px 9px;
      text-align: left;
      font-size: 13px;
      vertical-align: top;
      line-height: 1.55;
    }
    th { background: #edf2f6; color: #3f4b56; }
    .section { margin-top: 14px; }
    .notice { border-left: 4px solid var(--amber); background: #fff8e8; }
    .risk { border-left: 4px solid var(--red); background: #fff4f4; }
    .good { border-left: 4px solid var(--green); background: #f2fbf6; }
    textarea {
      width: 100%;
      min-height: 330px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 12px;
      font-family: Consolas, "Microsoft YaHei", sans-serif;
      font-size: 13px;
    }
    button.action {
      border: 1px solid #9fb3c2;
      background: #fff;
      border-radius: 6px;
      padding: 8px 10px;
      cursor: pointer;
      margin-right: 8px;
    }
    .dense p { margin: 7px 0; line-height: 1.7; }
    .loader { padding: 30px; color: var(--muted); }
    @media (max-width: 900px) {
      .grid, .grid3, .cols { grid-template-columns: 1fr; }
      .topbar { display: block; }
      .datebox { margin-top: 12px; white-space: normal; }
      th, td { font-size: 12px; }
    }
  </style>
</head>

      },

          { name: "创业板指", close: 4017.27, pct: -5.71 },

        ],

        signals: [

          { source: "韩国", watch: "三星电子、SK海力士、HBM、存储周期", aShareMap: "雅克、江丰、材料链、先进封装、存储周期", action: "韩国存储止跌或走强，A股材料链更容易修复。" },
          { source: "日经", watch: "半导体设备、电子材料、机器人、汽车链", aShareMap: "华海清科、安集、南大光电、富特科技、功率半导体", action: "日经科技链止跌，A股设备/材料修复概率提高。" }
        ],
        portfolioImpact: [
          { target: "富特科技", link: "新能源车出口、800V快充、欧洲关税和国内新能源车销量。", use: "政策改善可支撑趋势，但高仓位仍要防补跌。" },
          { target: "江丰/雅克/鼎龙/菲利华", link: "费半、韩国存储、日经半导体设备、国产替代。", use: "外围止跌是材料链反包前提；外围弱时反弹不追。" }

        stance: "防守",
        holdings: [
          { name: "巨化股份", code: "600160", weight: "30.85%", accountReturnPct: -1.01, close: 45.72, pct: -1.01, action: "周期防守仓，先看制冷剂/氟化工承接。", risk: "周期防守仓", theme: "制冷剂/氟化工/周期涨价" },
          { name: "富特科技", code: "301607", weight: "22.85%", accountReturnPct: -9.70, close: 47.81, pct: -9.70, action: "从重仓降为验证仓，先止跌再谈加仓。", risk: "高波动验证仓", theme: "新能源车高压电源/800V快充" },
          { name: "浪潮信息", code: "000977", weight: "21.98%", accountReturnPct: 10.00, close: 78.17, pct: 10.00, action: "业绩预告超预期，持有看承接，不追高。", risk: "业绩兑现主线仓", theme: "AI服务器/国产算力" },
          { name: "江丰电子", code: "300666", weight: "18.78%", accountReturnPct: 1.48, close: 333.86, pct: 1.48, action: "半导体材料仓，必须看材料链共振修复。", risk: "材料链修复仓", theme: "高纯靶材/半导体材料" },
          { name: "欣锐科技", code: "300745", weight: "5.54%", accountReturnPct: -11.78, close: 49.24, pct: -11.78, action: "小仓验证，不补跌，不扩大同方向暴露。", risk: "止损观察仓", theme: "新能源车车载电源/高压快充" }
        ]
      },
      watchlist: [
        ["通富微电", "先进封装/HBM", "科技线修复时可能先反弹", "科创50止跌且封测放量", "先观察，最多小仓"],
        ["长电科技", "封测/先进封装", "先进封装稳健锚", "封测板块回流", "3%以内"],
        ["安集科技", "CMP材料", "验证鼎龙和材料链", "材料资金回流", "不追高"],
        ["南大光电", "光刻胶/电子特气", "政策弹性高", "光刻胶催化+放量", "事件仓"],
        ["金宏气体", "电子特气", "雅克映射", "气体链强于材料链", "小仓"],
        ["新洁能", "功率半导体", "验证露笑", "功率半导体止跌", "暂不急"]
      ]
    };

    let state = fallbackData;
    const VALUATION_REBUILDING = false;

    function fmtPct(v) {
      if (v === null || v === undefined || v === "") return "-";
      const n = Number(v);
      if (!Number.isFinite(n)) return v || "-";
      return (n > 0 ? "+" : "") + n.toFixed(2) + "%";
    }

    function pctClass(v) {
      const n = Number(v);
      return n > 0 ? "red" : n < 0 ? "green" : "";
    }

    function scoreToFive(value, max) {
      const n = Number(value);
      if (!Number.isFinite(n) || !Number.isFinite(Number(max)) || Number(max) <= 0) return 0;
      return Math.max(0, Math.min(5, Math.round((n / Number(max)) * 5)));
    }

    function stars(value) {
      const n = Math.max(0, Math.min(5, Number(value) || 0));
      return `<span class="stars">${"★".repeat(n)}${"☆".repeat(5 - n)}</span>`;
    }

    function valueStatusClass(status) {
      if (status === "深度低估" || status === "当前深度低估") return "deep";
      if (status === "低估陷阱风险") return "trap";
      if (status === "周期盈利需中枢化") return "trap";
      return "reasonable";
    }

    function fmtWan(value) {
      const number = Number(value);
      if (!Number.isFinite(number)) return "待补";
      if (Math.abs(number) >= 10000) return `${(number / 10000).toFixed(2)}亿`;
      return `${number.toFixed(0)}万`;
    }

    function institutionalEvidence(item) {
      const parts = [];
      if (item.fundFlow) {
        parts.push(`5日主力 ${fmtWan(item.fundFlow.net5dAmountWan)}（${item.fundFlow.tradeDate || "日期待补"}）`);
      }
      if (item.chip) {
        const winner = Number(item.chip.winnerRate);
        parts.push(`筹码均价 ${item.chip.averageCost ?? "-"}，获利盘 ${Number.isFinite(winner) ? `${winner.toFixed(1)}%` : "待补"}`);
      }
      if (item.institutionResearch?.records90d) {
        parts.push(`近90日机构调研 ${item.institutionResearch.records90d}场，最近 ${item.institutionResearch.latestDate || "-"}`);
      }
      if (item.sellerConsensus?.consensusBrokerCount) {
        parts.push(`${item.sellerConsensus.consensusBrokerCount}家机构预测 ${item.sellerConsensus.consensusQuarter || ""} 净利中位数 ${item.sellerConsensus.consensusProfitYi ?? "-"}亿`);
      }
      return parts.length ? parts.join("<br>") : "特色证据待补，不按零值计分";
    }

    function card(title, body) {
      return `<div class="card"><h2>${title}</h2>${body}</div>`;
    }

    function globalMeaning(name, pct) {
      const n = Number(pct);
      if (name.includes("半导体")) {
        return n < -3 ? "芯片链明显承压，A股半导体材料和先进封装先防守。" : "芯片链可观察修复，A股材料/封测看成交确认。";
      }
      if (name.includes("韩国")) {
        return n < -3 ? "韩国存储/HBM风险释放，压制雅克、江丰、先进封装情绪。" : "韩国止跌有利于材料链修复。";
      }
      if (name.includes("日经")) {
        return n < -2 ? "日本半导体设备/电子材料走弱，A股设备材料不急抄底。" : "日经设备链配合时，A股设备材料更容易修复。";
      }
      if (name.includes("纳斯达克")) {
        return n < -1 ? "美股科技风险偏好下降，A股成长股降预期。" : "美股科技稳定，有利于A股AI硬件和科技修复。";
      }
      if (name.includes("恒生")) {
        return n > 0 ? "港股风险偏好尚可，可观察A股情绪是否跟随。" : "港股偏弱时，A股风险偏好也会受压。";
      }
      return "作为全球风险偏好参考。";
    }

    function holdingsRows() {
      return (state.portfolio.holdings || []).map(h => `
        <tr>
          <td><b>${h.name}</b><br><span class="muted">${h.code}</span></td>
          <td>${h.weight || "-"}<br>${h.theme || ""}</td>
          <td><span class="${pctClass(h.accountReturnPct)}">${fmtPct(h.accountReturnPct)}</span><br><span class="muted">持仓收益</span></td>
          <td>${h.close ?? "-"}<br><span class="${pctClass(h.pct)}">${fmtPct(h.pct)}</span></td>
          <td>${h.high ?? "-"} / ${h.low ?? "-"}</td>
          <td><b>${h.risk || "-"}</b><br>${h.action || "-"}</td>
        </tr>
      `).join("");
    }

    function unifiedPage(id) {
      const chief = state.chiefDecision || {};
      const advice = state.portfolioAdvice || {};
      const funding = state.fundingStructure || {};
      const events = state.unifiedEvents || [];
      const health = state.dataHealth || {};
      const transmission = state.globalTransmission || [];
      const globalDaily = state.macro?.globalMarkets || [];
      const industryMap = state.independentIndustryMap || {};
      const meta = state.meta || {};
      const timeLine = `<p class="muted">模型计算：${meta.lastUpdated || "-"} ｜ 行情：${health.sources?.find(x => x.name === "行情与市值")?.latestDataAt || "待确认"} ｜ 财务：${health.sources?.find(x => x.name === "财务数据")?.latestDataAt || "待确认"} ｜ 公告/新闻：${health.sources?.find(x => x.name === "公司公告")?.latestDataAt || "待确认"}</p>`;

      if (VALUATION_REBUILDING && ["actions", "industry", "elasticity", "value", "fiveX"].includes(id)) {
        return `${timeLine}<div class="section card risk dense"><h2>估值系统重构中</h2><p>该页面依赖的目标价、目标市值、上涨空间、估值评分和估值驱动买卖建议已暂停展示。当前正在改为产业空间、公司份额、新业务商业化、政策传导和未来利润共同驱动的统一估值；完成逐股审计前不恢复排名和建议。</p><p><b>仍可使用：</b>行情、涨跌幅、公告原文、财报事实、指数趋势和市场宽度。旧估值数字全部作废。</p></div>`;
      }

      if (id === "overview") {
        const stage = chief.marketStage || {};
        if (VALUATION_REBUILDING) {
          const breadth = funding.marketBreadth || {};
          return `${timeLine}
            <div class="section card risk dense"><h2>估值与推荐暂停</h2><p>底层产业驱动估值正在重构。目标价、目标市值、上涨空间、候选排名及由此产生的持仓动作暂不展示，旧数字全部作废。</p></div>
            <div class="section card dense"><h2>当前市场阶段（仅行情与趋势）</h2><p><b>${stage.regime || "等待有效数据"}</b> ｜ ${stage.phase || "待确认"} ｜ 风险偏好：${stage.riskPreference || "待确认"}</p><p>${stage.basis || "数据不足时不输出强结论。"}</p><table><thead><tr><th>指数</th><th>收盘</th><th>当日</th><th>中期趋势</th></tr></thead><tbody>${(stage.indices || []).map(x => `<tr><td><b>${x.name}</b></td><td>${x.close ?? "-"}</td><td class="${pctClass(x.pct)}">${fmtPct(x.pct)}</td><td>${x.trend?.status || "待确认"}<br><span class="muted">${x.trend?.read || "周线数据待确认"}</span></td></tr>`).join("")}</tbody></table></div>
            <div class="grid">${card("上涨/下跌", `<div class="num">${breadth.upCount ?? "-"} / ${breadth.downCount ?? "-"}</div>`)}${card("涨停/跌停", `<div class="num">${breadth.limitUp ?? "-"} / ${breadth.limitDown ?? "-"}</div>`)}${card("数据健康", `<p><b>${health.degraded ? "降级运行" : "数据正常"}</b></p>`)}</div>`;
        }
        return `${timeLine}
          <div class="section card risk dense"><h2>当前市场阶段</h2>
            <p><b>${stage.regime || "等待有效数据"}</b> ｜ ${stage.phase || "待确认"} ｜ 风险偏好：${stage.riskPreference || "待确认"} ｜ 合理仓位：${stage.positionRange || "待确认"}</p>
            <p>${stage.basis || "数据不足时不输出强结论。"}</p>
            <table><thead><tr><th>指数</th><th>收盘</th><th>当日</th><th>中期趋势</th></tr></thead><tbody>${(stage.indices || []).map(x => `<tr><td><b>${x.name}</b></td><td>${x.close ?? "-"}</td><td class="${pctClass(x.pct)}">${fmtPct(x.pct)}</td><td>${x.trend?.status || "待确认"}<br><span class="muted">${x.trend?.read || "周线数据待确认"}</span></td></tr>`).join("")}</tbody></table>
          </div>

      document.getElementById("updateBox").innerHTML = `页面更新时间：${state.meta.lastUpdated || "-"}<br>版本：${state.meta.session || "-"}<br>指导对象：${state.meta.guidanceTarget || "-"}<br>自动更新：每日北京时间 18:00<br>分析模型：${state.macro?.modelAnalysis?.model || "等待模型确认"}`;
      initTabs();
      render("overview");
    }

    loadData();
  </script>
