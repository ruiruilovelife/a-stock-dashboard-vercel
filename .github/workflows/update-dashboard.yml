name: Update A Stock Dashboard

on:
  # GitHub Actions cron uses UTC. These map to 16:00, 18:00 and 20:00 Asia/Shanghai.
  schedule:
    - cron: "0 8 * * *"   # 16:00 Asia/Shanghai
    - cron: "0 10 * * *"  # 18:00 Asia/Shanghai
    - cron: "0 12 * * *"  # 20:00 Asia/Shanghai
  workflow_dispatch:
  push:
    paths:
      - ".github/manual-refresh"

permissions:
  contents: write

concurrency:
  group: update-dashboard
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Apply portfolio config
        run: node scripts/apply-portfolio-config.mjs

      - name: Update dashboard data
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_DAILY_MODEL: gpt-5.6-terra
          OPENAI_DEEP_MODEL: gpt-5.6-terra
          OPENAI_REASONING_EFFORT: medium
          REQUIRE_MODEL_ANALYSIS: "true"
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: npm run update

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update dashboard data"
          file_pattern: data/*.json
