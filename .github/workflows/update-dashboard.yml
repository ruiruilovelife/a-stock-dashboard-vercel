name: Update A Stock Dashboard

on:
  push:
    branches:
      - main
  schedule:
    # Start at 18:00 Asia/Shanghai and retry the trigger through 19:45.
    # The schedule gate allows only the first successful daily model update.
    - cron: "0,15,30,45 10,11 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-dashboard
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Schedule gate
        id: schedule_gate
        run: node scripts/schedule-gate.mjs

      - name: Apply portfolio config
        if: steps.schedule_gate.outputs.should_run == 'true'
        run: node scripts/apply-portfolio-config.mjs

      - name: Update dashboard data
        if: steps.schedule_gate.outputs.should_run == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_DAILY_MODEL: gpt-5.6-sol
          OPENAI_DEEP_MODEL: gpt-5.6-sol
          OPENAI_REASONING_EFFORT: max
          REQUIRE_MODEL_ANALYSIS: "true"
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: npm run update

      - name: Commit updated data
        if: steps.schedule_gate.outputs.should_run == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update dashboard data"
          file_pattern: data/*.json
