name: Update A Stock Dashboard

on:
  push:
    paths:
      - ".github/workflows/update-dashboard.yml"
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-dashboard
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - id: schedule_gate
        run: node scripts/schedule-gate.mjs
      - if: steps.schedule_gate.outputs.should_run == 'true'
        run: node scripts/apply-portfolio-config.mjs
      - if: steps.schedule_gate.outputs.should_run == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_DAILY_MODEL: gpt-5.6-terra
          OPENAI_DEEP_MODEL: gpt-5.6-terra
          OPENAI_REASONING_EFFORT: high
          REQUIRE_MODEL_ANALYSIS: "true"
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: npm run update
      - if: steps.schedule_gate.outputs.should_run == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update dashboard data"
          file_pattern: data/*.json
