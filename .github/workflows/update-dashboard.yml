name: Update A Stock Dashboard

on:
  # Official daily edition only: 18:00 China Standard Time (UTC+8).
  # GitHub may queue a cron job late; the script rejects any non-evening run.
  schedule:
    - cron: "0 10 * * *"  # 18:00 China time
  workflow_dispatch:
  push:
    paths:
      - ".github/manual-refresh"

permissions:
  contents: write

concurrency:
  group: update-dashboard
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Apply portfolio config
        run: node scripts/apply-portfolio-config.mjs

      - name: Update dashboard data
        env:
          DASHBOARD_SESSION_OVERRIDE: "盘后复盘版"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_DAILY_MODEL: gpt-5.6-terra
          OPENAI_DEEP_MODEL: gpt-5.6-terra
          OPENAI_REASONING_EFFORT: medium
          REQUIRE_MODEL_ANALYSIS: "true"
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: npm run update

      - name: Commit updated data safely
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Portfolio config is applied to the runtime script for this run only.
          # Keep that temporary edit out of the rebase/commit worktree.
          git restore --worktree scripts/update-dashboard.mjs
          git add data/*.json

          if git diff --cached --quiet; then
            echo "No generated data changes to commit."
            exit 0
          fi

          git commit -m "chore: update dashboard data"

          # Rebase generated data onto current main if a code update landed
          # while this long-running research task was in progress.
          for attempt in 1 2 3; do
            git fetch origin main
            if ! git rebase origin/main; then
              git checkout --theirs -- data/
              git add data/
              GIT_EDITOR=true git rebase --continue
            fi

            if git push origin HEAD:main; then
              exit 0
            fi

            echo "Push attempt ${attempt} conflicted; retrying."
            sleep 5
          done

          echo "Unable to push generated data after three attempts."
          exit 1
