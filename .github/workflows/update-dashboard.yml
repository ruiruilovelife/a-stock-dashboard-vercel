name: Update A Stock Dashboard

on:
  # Website deployment is handled by Vercel on every GitHub push.
  # Run several after-close checks so a delayed or missed GitHub schedule
  # still has same-day fallback opportunities. schedule-gate.mjs prevents
  # duplicate refreshes after a successful after-close update.
  schedule:
    - cron: "40 9 * * *"   # 17:40 Asia/Shanghai
    - cron: "20 10 * * *"  # 18:20 Asia/Shanghai
    - cron: "0 12 * * *"   # 20:00 Asia/Shanghai fallback
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-dashboard
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Schedule gate
        id: schedule_gate
        run: node scripts/schedule-gate.mjs

      - name: Apply portfolio config
        if: steps.schedule_gate.outputs.should_run == 'true'
        run: node scripts/apply-portfolio-config.mjs

      - name: Update dashboard data
        if: steps.schedule_gate.outputs.should_run == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_DAILY_MODEL: gpt-5.6-terra
          OPENAI_DEEP_MODEL: gpt-5.6-terra
          OPENAI_REASONING_EFFORT: medium
          REQUIRE_MODEL_ANALYSIS: "true"
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: npm run update

      - name: Commit updated data
        if: steps.schedule_gate.outputs.should_run == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update dashboard data"
          file_pattern: data/*.json
